services:
  - type: web
    name: finance-hub-api
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./finance-hub-backend/Dockerfile
    dockerContext: ./finance-hub-backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: HUGGINGFACE_SPACE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
